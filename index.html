<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>대출 관리 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf0;font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1d2e}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
input,textarea,select,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* 로딩 */
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1117;z-index:999}
.spinner{width:36px;height:36px;border:3px solid #2a2d3e;border-top:3px solid #4f6ef7;border-radius:50%;animation:spin .8s linear infinite}
#loading p{color:#6b7db3;margin-top:14px;font-size:14px}

/* 로그인 */
#login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1117}
.login-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:#e8eaf0;margin-bottom:6px}
.login-sub{color:#6b7db3;font-size:13px;margin-bottom:32px}
.login-field{margin-bottom:18px;text-align:left}
.login-label{display:block;color:#9aa5c4;font-size:12px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-input{width:100%;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;padding:12px 14px;color:#e8eaf0;font-size:14px;outline:none}
.login-input:focus{border-color:#4f6ef7}
.login-btn{width:100%;background:linear-gradient(135deg,#4f6ef7,#7c3aed);color:white;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:disabled{opacity:.6}
.login-error{color:#ef5350;font-size:13px;margin:0 0 12px;text-align:center;padding:8px;background:#2e1010;border-radius:6px}

/* 앱 전체 */
#app{display:flex;flex-direction:column;height:100dvh}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0}
.app-header-left{display:flex;align-items:center;gap:8px}
.app-title{font-weight:700;font-size:14px}
.app-header-right{display:flex;align-items:center;gap:10px}
.user-email{color:#6b7db3;font-size:11px}
.logout-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}

/* 메인 탭 */
.main-tabs{display:flex;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0;padding:0 16px}
.main-tab{background:none;border:none;border-bottom:3px solid transparent;color:#6b7db3;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.main-tab.active{color:#7c9ef8;border-bottom-color:#4f6ef7}

/* 탭 패널 */
.tab-panel{flex:1;display:flex;overflow:hidden;min-height:0}

/* ═══════════════════════════════
   진행현황 - 4분할 레이아웃
═══════════════════════════════ */
.loan-layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* 공통 컬럼 */
.col{display:flex;flex-direction:column;border-right:1px solid #2a2d3e;overflow:hidden;min-height:0}
.col:last-child{border-right:none}
.col-header{display:flex;align-items:center;gap:7px;padding:9px 12px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0}
.col-title{color:#7c9ef8;font-weight:700;font-size:12px;flex:1}

/* 업체 컬럼 */
.col-company{width:170px;flex-shrink:0}
.company-list{flex:1;overflow-y:auto}
.company-row{padding:10px 12px;cursor:pointer;border-bottom:1px solid #1e2135;transition:all .15s;display:flex;align-items:center;gap:8px}
.company-row:hover{background:#1e2135}
.company-row.active{background:#252840;border-left:3px solid #4f6ef7;padding-left:9px}
.company-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#4caf50}
.company-dot.empty{background:#2a2d3e}
.company-name{color:#e8eaf0;font-size:13px;font-weight:600;flex:1}
.company-cnt{color:#6b7db3;font-size:10px;flex-shrink:0}
.company-add-row{padding:8px;border-top:1px solid #2a2d3e;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.company-add-input{width:100%;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;outline:none}
.company-add-input:focus{border-color:#4f6ef7}
.company-add-btn{width:100%;background:#4f6ef7;color:white;border:none;border-radius:5px;padding:6px;font-size:12px;cursor:pointer;font-weight:700}

/* 진행현황 컬럼 */
.col-loans{flex:1;min-width:0}
.loan-list-header{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0;flex-wrap:wrap}
.loan-title{color:#e8eaf0;font-weight:700;font-size:12px;flex:1;min-width:50px}
.search-input{background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:4px 8px;color:#e8eaf0;font-size:12px;width:110px;outline:none}
.search-input:focus{border-color:#4f6ef7}
.share-btn{background:#005588;color:white;border:none;border-radius:4px;padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.loan-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.loan-item{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:6px;padding:9px;animation:fadeIn .2s ease;cursor:pointer}
.loan-view{cursor:pointer}
.loan-view:hover{opacity:.9}
.loan-item:active{cursor:grabbing}
.loan-item.dragging{opacity:.5;border:2px dashed #4f6ef7}
.loan-item.drag-over{border-color:#4caf50;background:#1a2e1a}
.loan-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.customer-info{flex:1}
.customer-name{color:#e8eaf0;font-weight:700;font-size:13px}
.customer-status{color:#7c9ef8;font-size:11px;margin-top:1px}
.loan-actions{display:flex;gap:3px;flex-shrink:0}
.edit-btn{background:#2a5298;color:white;border:none;border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer}
.del-btn{background:#7a1e1e;color:white;border:none;border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer}
.save-btn{background:#1a7a3a;color:white;border:none;border-radius:3px;padding:3px 9px;font-size:10px;cursor:pointer}
.cancel-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:3px;padding:3px 9px;font-size:10px;cursor:pointer}
.loan-details{color:#9aa5c4;font-size:11px;white-space:pre-wrap;line-height:1.5;margin-top:4px;word-break:break-all}
.edit-form{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.edit-input{background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:5px 8px;color:#e8eaf0;font-size:11px;outline:none}
.edit-input:focus{border-color:#4f6ef7}
.edit-textarea{background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:5px 8px;color:#e8eaf0;font-size:11px;resize:vertical;outline:none;line-height:1.5;min-height:60px;width:100%}
.edit-textarea:focus{border-color:#4f6ef7}
.edit-actions{display:flex;gap:4px}
.add-customer-row{padding:8px;border-top:1px solid #2a2d3e;display:flex;gap:6px;flex-shrink:0}
.add-input{flex:1;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:5px;padding:6px 10px;color:#e8eaf0;font-size:12px;outline:none}
.add-input:focus{border-color:#4f6ef7}
.add-btn{background:#4f6ef7;color:white;border:none;border-radius:5px;padding:6px 10px;font-size:11px;cursor:pointer;font-weight:700}

/* 공유 패널 컬럼 */
.col-shared{width:300px;flex-shrink:0;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.panel-search{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:3px 7px;color:#e8eaf0;font-size:11px;outline:none}
.panel-search:focus{border-color:#4f6ef7}
.shared-area{flex:1;background:#0f1117;border:none;color:#e8eaf0;font-size:12px;padding:10px;resize:none;outline:none;line-height:1.8}
.panel-add-btn{background:#4f6ef7;color:white;border:none;border-radius:4px;padding:2px 8px;font-size:13px;cursor:pointer;font-weight:700;flex-shrink:0}

/* 카드 리스트 */
.card-list{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;min-height:0}
.notice-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:6px;padding:9px 10px;animation:fadeIn .2s ease}
.notice-card:hover{border-color:#3a4060}
.notice-card.search-match{border-color:#4f6ef7;background:#1a2050}
.nc-header{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.nc-branch{color:#7c9ef8;font-weight:700;font-size:12px}
.nc-date{color:#6b7db3;font-size:10px}
.nc-customer{color:#e8eaf0;font-weight:700;font-size:13px;margin-bottom:2px}
.nc-location{color:#9aa5c4;font-size:11px;margin-bottom:4px}
.nc-job{display:inline-block;background:#252840;color:#9aa5c4;border-radius:3px;padding:1px 6px;font-size:10px;margin-bottom:5px}
.nc-results{display:flex;flex-direction:column;gap:2px;margin-bottom:5px}
.nc-result{font-size:11px;padding:2px 0;display:flex;align-items:flex-start;gap:4px}
.nc-result-bank{color:#9aa5c4;font-weight:600;flex-shrink:0}
.nc-result-content{color:#6b7db3;flex:1}
.nc-result.limit .nc-result-bank{color:#f8964a}
.nc-result.limit .nc-result-content{color:#f8964a;font-weight:600}
.nc-result.review .nc-result-bank{color:#7cc8f8}
.nc-result.review .nc-result-content{color:#7cc8f8}
.nc-result.empty .nc-result-content{color:#3a4060}
.nc-memo{color:#6b7db3;font-size:11px;margin-top:3px;padding-top:3px;border-top:1px solid #1e2135}
.nc-actions{display:flex;gap:4px;margin-top:5px}
.nc-new{cursor:pointer;border:2px dashed #2a2d3e;background:transparent;display:flex;align-items:center;justify-content:center;padding:10px;transition:all .15s}
.nc-new:hover{border-color:#4f6ef7;background:#1a1d2e}
.nc-row1{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.nc-row2{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.nc-sep{color:#3a4060;font-size:11px}
.nc-location{color:#9aa5c4;font-size:11px}
.nc-job-inline{background:#252840;color:#9aa5c4;border-radius:3px;padding:1px 6px;font-size:10px;margin-left:2px}
.nc-inline-btns{margin-left:auto;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.notice-card:hover .nc-inline-btns{opacity:1}
.nc-del-btn{background:#2e1a1a;color:#ef5350;border:none;border-radius:3px;padding:1px 6px;font-size:10px;cursor:pointer}
.nc-view{cursor:pointer}
.nc-edit{display:flex;flex-direction:column;gap:5px}
.nc-edit-row{display:flex;gap:5px}
.nc-input{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:5px 8px;color:#e8eaf0;font-size:12px;outline:none}
.nc-input:focus{border-color:#4f6ef7}
.nc-ta{height:65px;resize:vertical;line-height:1.5}
.nc-edit-actions{display:flex;gap:5px;justify-content:flex-end}
.nc-save-btn{background:#4f6ef7;color:white;border:none;border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:700}
.nc-cancel-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer}
.card-group{margin-bottom:6px;border:1px solid #2a2d3e;border-radius:6px;}
.card-group-header{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#1a1d2e;cursor:pointer;user-select:none;transition:background .15s}
.card-group-header:hover{background:#1e2135}
.card-group-title{font-size:11px;font-weight:700;flex:1}
.card-group-cnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.card-group-toggle{color:#6b7db3;font-size:10px;flex-shrink:0}
.card-group-body{background:#0f1117}
.card-group-body .notice-card{border-radius:0;border-left:none;border-right:none;border-top:none;border-bottom:1px solid #1e2135}
.card-group-body .notice-card:last-child{border-bottom:none}
.card-edit-btn{background:#252840;color:#9aa5c4;border:none;border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer}
.card-del-btn{background:#2e1a1a;color:#ef5350;border:none;border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;width:100%;max-width:420px;margin:16px;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #2a2d3e}
.modal-title{color:#e8eaf0;font-weight:700;font-size:14px}
.modal-close{background:none;border:none;color:#6b7db3;font-size:16px;cursor:pointer;padding:2px 6px}
.modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px;max-height:70vh;overflow-y:auto}
.modal-row{display:flex;align-items:flex-start;gap:10px}
.modal-label{color:#9aa5c4;font-size:12px;min-width:50px;padding-top:7px;flex-shrink:0}
.modal-input{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:7px 9px;color:#e8eaf0;font-size:13px;outline:none}
.modal-input:focus{border-color:#4f6ef7}
.modal-textarea{height:60px;resize:vertical;line-height:1.5}
.modal-select{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:7px 9px;color:#e8eaf0;font-size:13px;outline:none}
.modal-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #2a2d3e;justify-content:flex-end}
.modal-save-btn{background:#4f6ef7;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:700}
.modal-cancel-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer}

/* ═══════════════════════════════
   상품관리
═══════════════════════════════ */
.product-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.product-sidebar{width:230px;background:#1a1d2e;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0}
.product-top{padding:8px;display:flex;gap:6px;border-bottom:1px solid #2a2d3e}
.product-search{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:5px 8px;color:#e8eaf0;font-size:12px;outline:none}
.product-search:focus{border-color:#4f6ef7}
.product-add-btn{background:#4f6ef7;color:white;border:none;border-radius:5px;padding:5px 9px;font-size:12px;cursor:pointer;font-weight:700}
.product-count{padding:4px 10px;color:#6b7db3;font-size:10px}
.product-list{flex:1;overflow-y:auto}
.product-item{padding:8px 11px;cursor:pointer;border-bottom:1px solid #1e2135;transition:all .15s}
.product-item:hover{background:#1e2135}
.product-item.active{background:#252840}
.product-name-row{display:flex;align-items:center;gap:4px;font-weight:600;font-size:12px}
.stop-dot{color:#ef5350;font-size:9px}
.product-sub{color:#6b7db3;font-size:10px;margin-top:2px}
.product-detail{flex:1;overflow-y:auto;padding:16px}
.product-placeholder{display:flex;align-items:center;justify-content:center;height:150px;color:#3a4060;font-size:14px}
.detail-stop{background:#3a1010;color:#ef5350;border-radius:4px;padding:5px 10px;font-weight:700;font-size:11px;margin-bottom:10px;display:inline-block}
.detail-name{color:#e8eaf0;font-size:18px;font-weight:700;margin-bottom:3px}
.detail-product-lbl{color:#7c9ef8;font-size:12px;margin-bottom:12px}
.detail-btn-row{display:flex;gap:6px;margin-bottom:12px}
.detail-edit-btn{background:#2a5298;color:white;border:none;border-radius:4px;padding:5px 11px;font-size:11px;cursor:pointer}
.detail-del-btn{background:#7a1e1e;color:white;border:none;border-radius:4px;padding:5px 11px;font-size:11px;cursor:pointer}
.detail-sep{border:none;border-top:1px solid #2a2d3e;margin:9px 0}
.d-field{margin-bottom:9px}
.d-label{color:#6b7db3;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.d-val{color:#e8eaf0;font-size:12px;line-height:1.5}
.d-region{color:#7c9ef8;font-size:12px;line-height:1.6}
.tag{display:inline-block;border-radius:3px;padding:1px 6px;font-size:10px;margin:2px;background:#252840;color:#7c9ef8}
.tag.green{background:#1a2e1a;color:#4caf50}
.tag.red{background:#2e1a1a;color:#ef5350}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:9px}

/* ═══════════════════════════════
   통계
═══════════════════════════════ */
.stats-layout{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.stats-top{display:flex;align-items:center;gap:10px}
.stats-date-input{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:5px;padding:6px 10px;color:#e8eaf0;font-size:12px;outline:none}
.stats-date-input:focus{border-color:#4f6ef7}
.stats-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:12px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:#7c9ef8}
.stat-lbl{font-size:10px;color:#6b7db3;margin-top:3px}
.stats-table-wrap{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;overflow:hidden}
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{color:#6b7db3;font-weight:600;padding:8px 10px;border-bottom:1px solid #2a2d3e;text-align:left;background:#131620;white-space:nowrap}
.stats-table td{padding:7px 10px;border-bottom:1px solid #1e2135;color:#c0c8e0}
.stats-table tr:last-child td{border-bottom:none}
.num{text-align:right;font-weight:600}
.stats-empty{color:#3a4060;text-align:center;padding:30px;font-size:13px}

/* 상품 폼 */
.form-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.form-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0}
.form-title{color:#e8eaf0;font-size:14px;font-weight:700}
.form-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.f-section{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:6px;padding:12px}
.f-section-title{color:#7c9ef8;font-weight:700;font-size:11px;margin-bottom:10px}
.f-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.f-label{color:#9aa5c4;font-size:12px;min-width:80px;flex-shrink:0}
.f-input{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:6px 8px;color:#e8eaf0;font-size:12px;outline:none}
.f-input:focus{border-color:#4f6ef7}
.f-select{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:6px 8px;color:#e8eaf0;font-size:12px;outline:none}
.region-wrap{display:flex;gap:7px;height:190px}
.sido-list{width:110px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;flex-shrink:0}

<script type="module">

const app=initializeApp(firebaseConfig);

const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let currentUser=null,companies={},allLoans=[],loans=[],products=[],selectedCompany="",selectedProduct=null;

// 메인 탭

onAuthStateChanged(auth,user=>{

});

function initData(){
  // 업체
  onSnapshot(doc(db,"settings","telegram_ids"),snap=>{
    if(!snap.exists())return;
    companies=snap.data();
    renderCompanies();
  });
  // 전체 loans (업체 점 표시용)
  onSnapshot(collection(db,"loans"),snap=>{
    allLoans=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCompanies();
  });
  // 지점접수현황 메모장
  onSnapshot(doc(db,"shared","notice"),s=>{
    if(s.exists()){const v=s.data().html||"";if($("notice-area")!==document.activeElement)$("notice-area").value=v;}
  });
  let noticeTimer=null;
  $("notice-area").addEventListener("input",()=>{
    clearTimeout(noticeTimer);
    noticeTimer=setTimeout(async()=>{
      await setDoc(doc(db,"shared","notice"),{html:$("notice-area").value,updatedBy:currentUser.email,updatedAt:new Date().toISOString()},{merge:true});
    },800);
  });
  // 카드 시스템 초기화 (진행건)
  initCards();
  // 상품
  onSnapshot(collection(db,"products"),snap=>{
    products=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    renderProductList();
  });
  // 통계 (주단위)
  initWeeklyStats();
  // 버튼
  $("add-btn").addEventListener("click",addCustomer);
  $("add-input").addEventListener("keydown",e=>{if(e.key==="Enter")addCustomer();});
  $("search-input").addEventListener("input",renderLoans);
  $("share-btn").addEventListener("click",shareToTelegram);
  $("c-add-btn").addEventListener("click",addCompany);
  $("product-add-btn").addEventListener("click",()=>showProductForm(null));
  $("product-search").addEventListener("input",renderProductList);
}

function searchInPanel(areaId,kw){
  const area=$(areaId);if(!kw)return;
  const txt=area.value.toLowerCase(),idx=txt.indexOf(kw.toLowerCase());
  if(idx>=0){area.focus();area.setSelectionRange(idx,idx+kw.length);}
}

// ── 카드 시스템 ──
let progressCards=[], noticeCards=[];
let cardModalKey="", cardEditId=null;

function initCards(){
  onSnapshot(collection(db,"progress_cards"),snap=>{
    progressCards=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order??9999)-(b.order??9999));
    renderCards("progress");
  });
  const psEl=$("progress-search");
  if(psEl) psEl.addEventListener("keydown",e=>{if(e.key==="Enter")renderCards("progress",psEl.value);});
}

function parseResults(text){
  // "금고명-결과" 파싱
  return (text||"").split("\n").map(line=>{
    const t=line.trim();if(!t)return null;
    const dash=t.indexOf("-");
    if(dash<0)return{bank:t,content:"",type:"empty"};
    const bank=t.slice(0,dash).trim();
    const content=t.slice(dash+1).trim();
    let type="normal";
    if(content.includes("★"))type="limit";
    else if(content.includes("※"))type="review";
    else if(!content)type="empty";
    return{bank,content,type};
  }).filter(Boolean);
}

function renderCards(key, searchKw){
  const cards=key==="progress"?progressCards:noticeCards;
  const kw=(searchKw||"").toLowerCase();
  const el=$(key+"-cards");
  const filtered=kw?cards.filter(c=>{
    const txt=[c.branch,c.name,c.location,c.job,c.results,c.memo,c.date,c.amount,c.bank,c.status].join(" ").toLowerCase();
    return txt.includes(kw);
  }):cards;

  if(!filtered.length){
    el.innerHTML="<div style='color:#3a4060;padding:20px;text-align:center;font-size:12px'>카드가 없습니다<br><small style='color:#2a2d3e'>＋ 버튼으로 추가하세요</small></div>";
    return;
  }

  if(key==="progress"){
    // 상태 그룹 정의 (순서 고정)
    const GROUPS=[
      {key:"자서예정",   label:"✏ 자서 예정",      bg:"#1a2e3a", clr:"#7cc8f8"},
      {key:"자서미정",   label:"⏳ 자서 미정",      bg:"#1e1e2e", clr:"#9aa5c4"},
      {key:"브릿지예정", label:"🔗 브릿지 예정",    bg:"#2a1a3a", clr:"#b07cf8"},
      {key:"브릿지미정", label:"⏳ 브릿지 미정",    bg:"#1e1e2e", clr:"#9aa5c4"},
      {key:"브릿지확인필요",label:"🔍 브릿지 확인필요",bg:"#2a1a2e",clr:"#e0a0f8"},
      {key:"당일기표예정",label:"📌 당일기표 예정",  bg:"#2e1a10", clr:"#ffb060"},
      {key:"기표예정",   label:"📋 기표 예정",      bg:"#2e2010", clr:"#f8964a"},
      {key:"기표미정",   label:"⏳ 기표 미정",      bg:"#1e1e2e", clr:"#9aa5c4"},
      {key:"완료",       label:"✅ 완료",           bg:"#1a2e1a", clr:"#4caf50"},
    ];
    const STATUS_BG=Object.fromEntries(GROUPS.map(g=>[g.key,g.bg]));
    const STATUS_CLR2=Object.fromEntries(GROUPS.map(g=>[g.key,g.clr]));

    // 그룹별로 카드 분류
    const grouped={};
    GROUPS.forEach(g=>grouped[g.key]=[]);
    filtered.forEach(c=>{
      const gk=c.status&&grouped[c.status]!==undefined?c.status:"자서예정";
      grouped[gk].push(c);
    });

    let html="";
    GROUPS.forEach(g=>{
      const list=grouped[g.key];
      if(!list.length&&!kw)return; // 검색 없을 때 비어있는 그룹 숨김
      const gid="pgrp-"+g.key.replace(/\s/g,"");
      const isOpen=list.length>0;
      html+=`<div class='card-group' id='grp-${gid}'>
        <div class='card-group-header' onclick="toggleCardGroup('${gid}')">
          <span class='card-group-title' style='color:${g.clr}'>${g.label}</span>
          <span class='card-group-cnt' style='background:${g.bg};color:${g.clr}'>${list.length}</span>
          <span class='card-group-toggle' id='tog-${gid}'>${isOpen?"▼":"▶"}</span>
        </div>
        <div class='card-group-body' id='body-${gid}' style='display:${isOpen?"block":"none"}'>
          ${list.length?list.map(c=>`
            <div class='notice-card' draggable='true' data-id='${c.id}' data-key='progress'>
              <div style='display:flex;align-items:flex-start;gap:6px;margin-bottom:4px'>
                <span style='color:#e8eaf0;font-weight:700;font-size:13px;flex:1'>${esc(c.name||"")}</span>
                ${c.amount?`<span style='color:#7c9ef8;font-size:12px;font-weight:600'>${esc(c.amount)}</span>`:""}
              </div>
              ${c.bank?`<div style='color:#9aa5c4;font-size:11px;margin-bottom:2px'>🏦 ${esc(c.bank)}</div>`:""}
              ${c.date?`<div style='color:#4f6ef7;font-size:11px;margin-bottom:3px'>📅 ${esc(c.date)}</div>`:""}
              ${c.memo?`<div style='color:#6b7db3;font-size:11px;white-space:pre-wrap;line-height:1.5'>${esc(c.memo)}</div>`:""}
              <div class='nc-actions'>
                <button class='card-edit-btn' data-id='${c.id}' data-key='progress'>수정</button>
                <button class='card-del-btn' data-id='${c.id}' data-key='progress'>삭제</button>
              </div>
            </div>`).join("")
          :"<div style='color:#3a4060;padding:8px 10px;font-size:11px'>없음</div>"}
        </div>
      </div>`;
    });
    el.innerHTML=html||"<div style='color:#3a4060;padding:20px;text-align:center;font-size:12px'>카드가 없습니다</div>";

    el.querySelectorAll(".card-edit-btn").forEach(btn=>btn.addEventListener("click",()=>openProgressModal(btn.dataset.id)));
    el.querySelectorAll(".card-del-btn").forEach(btn=>btn.addEventListener("click",()=>deleteCard("progress",btn.dataset.id)));
    if(kw){const first=el.querySelector(".search-match");if(first)first.scrollIntoView({block:"center"});}
    initCardDrag(el,"progress");
  } else {
    // 지점접수현황 카드 - 빈 카드(새 추가) + 기존 카드
    const newCard=`<div class='notice-card nc-new' id='nc-new-btn' title='클릭하여 새 접수 추가'>
      <span style='color:#3a4060;font-size:12px'>＋ 새 접수 추가</span>
    </div>`;

    const cards_html=filtered.map(c=>{
      const results=parseResults(c.results);
      const match=kw&&[c.branch,c.name,c.location,c.job,c.results,c.memo].join(" ").toLowerCase().includes(kw);
      return`<div class='notice-card${match?" search-match":""}' draggable='true' data-id='${c.id}' data-key='notice'>
        <div class='nc-view'>
          <div class='nc-row1'>
            <span class='nc-branch'>${esc(c.branch||"")}</span>
            ${c.date?`<span class='nc-date'>${esc(c.date)}</span>`:""}
            <span class='nc-inline-btns'>
              <button class='nc-del-btn' data-id='${c.id}'>✕</button>
            </span>
          </div>
          <div class='nc-row2'>
            <span class='nc-customer'>${esc(c.name||"")}</span>
            ${c.location?`<span class='nc-sep'>·</span><span class='nc-location'>${esc(c.location)}</span>`:""}
            ${c.job?`<span class='nc-job-inline'>${esc(c.job)}</span>`:""}
          </div>
          ${results.length?`<div class='nc-results'>${results.map(r=>`
            <div class='nc-result ${r.type}'>
              <span class='nc-result-bank'>${esc(r.bank)}</span>
              ${r.content?`<span class='nc-result-content'>- ${esc(r.content)}</span>`:""}
            </div>`).join("")}</div>`:""}
          ${c.memo?`<div class='nc-memo'>${esc(c.memo)}</div>`:""}
        </div>
        <div class='nc-edit hidden'>

function initCardDrag(el, key){
  el.querySelectorAll(".notice-card").forEach(card=>{
    card.style.cursor="grab";
    card.addEventListener("dragstart",e=>{
      cardDragId=card.dataset.id; cardDragKey=key;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
    });
    card.addEventListener("dragend",()=>card.classList.remove("dragging"));
    card.addEventListener("dragover",e=>{e.preventDefault();card.classList.add("drag-over");});
    card.addEventListener("dragleave",()=>card.classList.remove("drag-over"));
    card.addEventListener("drop",async e=>{
      e.preventDefault(); card.classList.remove("drag-over");
      if(!cardDragId||cardDragId===card.dataset.id||cardDragKey!==key)return;
      const cards=key==="progress"?progressCards:noticeCards;
      const col=key==="progress"?"progress_cards":"notice_cards";
      const all=[...el.querySelectorAll(".notice-card")];
      const fi=all.findIndex(c=>c.dataset.id===cardDragId);
      const ti=all.findIndex(c=>c.dataset.id===card.dataset.id);
      const reord=[...cards];
      const[mv]=reord.splice(fi,1); reord.splice(ti,0,mv);
      await Promise.all(reord.map((c,i)=>updateDoc(doc(db,col,c.id),{order:i})));
    });
  });
}

// 주간 통계
let currentWeekStart=null;
let weeklyUnsubs=[];

function getWeekStart(date){
  const d=new Date(date);
  const day=d.getDay(); // 0=일,1=월,...,5=금,6=토
  // 월요일 기준
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(d){return d.toISOString().slice(0,10);}

function initWeeklyStats(){
  currentWeekStart=getWeekStart(new Date());
  renderWeekLabel();
  loadWeeklyStats();
  $("stats-prev").addEventListener("click",()=>{
    currentWeekStart.setDate(currentWeekStart.getDate()-7);
    renderWeekLabel();loadWeeklyStats();
  });
  $("stats-next").addEventListener("click",()=>{
    currentWeekStart.setDate(currentWeekStart.getDate()+7);
    renderWeekLabel();loadWeeklyStats();
  });
}

function renderWeekLabel(){
  const end=new Date(currentWeekStart);end.setDate(end.getDate()+4); // 월~금 (5일)
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const days=["월","화","수","목","금"];
  $("stats-week-label").textContent=`${fmt(currentWeekStart)}(월) ~ ${fmt(end)}(금)`;
}

function loadWeeklyStats(){
  weeklyUnsubs.forEach(u=>u());weeklyUnsubs=[];
  // 월~금 5일만
  const dates=[];
  for(let i=0;i<5;i++){
    const d=new Date(currentWeekStart);d.setDate(d.getDate()+i);
    dates.push(formatDate(d));
  }

  const weekData={};
  dates.forEach(d=>weekData[d]=null);

  const tryMerge=()=>{
    if(Object.values(weekData).some(v=>v===null))return;
    const total={total:0,groups:{},progress_req:{},approved_groups:{},rejected_groups:{}};
    Object.values(weekData).forEach(d=>{
      if(!d)return;
      total.total+=(d.total||0);
      Object.entries(d.groups||{}).forEach(([k,v])=>total.groups[k]=(total.groups[k]||0)+v);
      Object.entries(d.progress_req||{}).forEach(([k,v])=>total.progress_req[k]=(total.progress_req[k]||0)+v);
      Object.entries(d.approved_groups||{}).forEach(([k,v])=>total.approved_groups[k]=(total.approved_groups[k]||0)+v);
      Object.entries(d.rejected_groups||{}).forEach(([k,v])=>total.rejected_groups[k]=(total.rejected_groups[k]||0)+v);
    });
    renderStats(total);
  };

  dates.forEach(dateStr=>{
    const unsub=onSnapshot(doc(db,"stats",dateStr),snap=>{
      weekData[dateStr]=snap.exists()?snap.data():{}; // null 대신 빈 객체
      tryMerge();
    });
    weeklyUnsubs.push(unsub);
  });
}

function renderStats(d){
  const groups=d.groups||{},total=d.total||0;
  const progReq=d.progress_req||{},approved=d.approved_groups||{},rejected=d.rejected_groups||{};
  const totalAppr=Object.values(approved).reduce((a,b)=>a+b,0);
  const totalRej=Object.values(rejected).reduce((a,b)=>a+b,0);
  $("s-total").textContent=total;$("s-appr").textContent=totalAppr;$("s-rej").textContent=totalRej;
  const active=Object.entries(groups).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!active.length){$("stats-tbody").innerHTML="<tr><td colspan='6' class='stats-empty'>이번 주 접수 없음</td></tr>";return;}
  $("stats-tbody").innerHTML=active.map(([g,cnt])=>{
    const req=progReq[g]||0,appr=approved[g]||0,rej=rejected[g]||0;
    const pct=cnt>0?Math.round(appr/cnt*100):0;
    return`<tr>
      <td>${esc(g)}</td>
      <td class="num">${cnt}</td>
      <td class="num">${req}</td>
      <td class="num" style="color:#4caf50">${appr}</td>
      <td class="num" style="color:#ef5350">${rej}</td>
      <td class="num">${pct?pct+"%":"-"}</td>
    </tr>`;
  }).join("");
}

function getSearchText(p){
  const regions=[...(p.regions||[])];
  (p.regions||[]).forEach(r=>{
    Object.entries(REGIONS).forEach(([sido,cities])=>{if(r.includes("전체")&&r.includes(sido))regions.push(...cities);});
    Object.entries(SIDO_ALIAS).forEach(([alias,full])=>{if(r.includes(full))regions.push(alias);});
  });
  return[p.name,p.product,...regions,...(p.building_types||[]),p.ltv,p.rate,p.junior_rank,p.junior_note,p.individual,p.business,p.memo,p.seonmalso?"선말소":"",p.tenant?"세입자":"",p.eviction_fund?"퇴거":"",p.mci?"MCI":""].join(" ").toLowerCase();
}

function renderProductList(){
  const kws=$("product-search").value.trim().toLowerCase().split(/[\s,]+/).filter(Boolean);
  const filtered=kws.length?products.filter(p=>{const t=getSearchText(p);return kws.every(k=>t.includes(k)||(SIDO_ALIAS[k]&&t.includes(SIDO_ALIAS[k].toLowerCase())));}):products;
  $("product-count").textContent=filtered.length+"개";
  $("product-list").innerHTML=filtered.map(p=>{
    const stopped=(p.product||"").includes("[중단]");
    return`<div class="product-item${selectedProduct?.id===p.id?" active":""}" data-id="${p.id}">
      <div class="product-name-row">${stopped?`<span class='stop-dot'>●</span>`:""}<span style="color:${stopped?"#ef5350":"#e8eaf0"}">${esc(p.name)}</span></div>
      <div class="product-sub">${(p.regions||[]).slice(0,2).map(r=>esc(r)).join(", ")}${(p.regions||[]).length>2?"...":""}</div>
    </div>`;
  }).join("")||"<div style='color:#3a4060;padding:20px;text-align:center;font-size:12px'>검색 결과 없음</div>";
  $("product-list").querySelectorAll(".product-item").forEach(el=>{
    el.addEventListener("click",()=>{selectedProduct=products.find(p=>p.id===el.dataset.id);renderProductList();renderProductDetail(selectedProduct);});
  });
}

function renderProductDetail(p){
  if(!p)return;
  const stopped=(p.product||"").includes("[중단]");
  const tag=(text,cls="")=>`<span class="tag ${cls}">${esc(text)}</span>`;
  $("product-detail").innerHTML=`
    ${stopped?`<div class='detail-stop'>🚫 중단된 상품</div>`:""}
    <h2 class="detail-name">${esc(p.name)}</h2>
    ${p.product?`<div class="detail-product-lbl">${esc((p.product||"").replace(" [중단]",""))}</div>`:""}
    <div class="detail-btn-row">
      <button class="detail-edit-btn" data-id="${p.id}">✏ 수정</button>
      <button class="detail-del-btn" data-id="${p.id}">🗑 삭제</button>
    </div>
    <hr class="detail-sep"/>
    ${(p.regions||[]).length?`<div class="d-field"><div class="d-label">가능 지역</div><div class="d-region">${p.regions.map(r=>esc(r)).join(", ")}</div></div>`:""}
    ${(p.building_types||[]).length?`<div class="d-field"><div class="d-label">건물 유형</div><div>${p.building_types.map(b=>tag(b)).join("")}</div></div>`:""}
    <div class="d-grid">
      ${p.ltv?`<div class="d-field"><div class="d-label">LTV</div><div class="d-val">${esc(p.ltv)}</div></div>`:""}
      ${p.rate?`<div class="d-field"><div class="d-label">금리</div><div class="d-val">${esc(p.rate)}</div></div>`:""}
    </div>
    <div class="d-field"><div class="d-label">후순위</div>${tag(p.junior_rank||"불가",p.junior_rank==="불가"?"red":"green")} ${p.junior_note?`<span style="color:#9aa5c4;font-size:11px;margin-left:5px">${esc(p.junior_note)}</span>`:""}</div>
    <div class="d-field"><div class="d-label">가능 여부</div>${[["선말소","seonmalso"],["세입자 물건지","tenant"],["퇴거자금","eviction_fund"],["MCI","mci"]].map(([l,k])=>tag((p[k]?"✓ ":"✗ ")+l,p[k]?"green":"red")).join("")}</div>
    <div class="d-grid">
      ${p.individual?`<div class="d-field"><div class="d-label">가계/동일인</div><div class="d-val">${esc(p.individual)}</div></div>`:""}
      ${p.business?`<div class="d-field"><div class="d-label">사업자</div><div class="d-val">${esc(p.business)}</div></div>`:""}
      ${p.purpose?`<div class="d-field"><div class="d-label">용도</div><div class="d-val">${esc(p.purpose)}</div></div>`:""}
    </div>
    ${p.memo?`<div class="d-field"><div class="d-label">메모</div><div class="d-val" style="color:#9aa5c4">${esc(p.memo)}</div></div>`:""}
  `;
  $("product-detail").querySelector(".detail-edit-btn").addEventListener("click",()=>showProductForm(p.id));
  $("product-detail").querySelector(".detail-del-btn").addEventListener("click",async()=>{
    if(!confirm("삭제할까요?"))return;
    await deleteDoc(doc(db,"products",p.id));
    selectedProduct=null;$("product-detail").innerHTML="<div class='product-placeholder'>← 상품을 선택하세요</div>";
  });
}

function showProductForm(id){
  const p=id?products.find(x=>x.id===id):null;
  formData=p?JSON.parse(JSON.stringify(p)):{name:"",product:"컨비",regions:[],building_types:[],ltv:"",rate:"",junior_rank:"불가",junior_note:"",seonmalso:false,tenant:false,eviction_fund:false,mci:false,individual:"",business:"",purpose:"",memo:""};
  activeSido=Object.keys(REGIONS)[0];
  $("product-main-view").style.display="none";
  $("product-form-view").classList.remove("hidden");
  renderForm(id);
}

function renderForm(id){
  const f=formData;
  $("product-form-view").innerHTML=`
    <div class="form-header">
      <div class="form-title">${id?"상품 수정":"상품 등록"}</div>
      <div style="display:flex;gap:7px">
        <button class="form-cancel-btn" id="f-cancel">취소</button>
        <button class="form-save-btn" id="f-save">저장</button>
      </div>
    </div>
    <div class="form-body">
      <div class="f-section">
        <div class="f-section-title">기본 정보</div>
        <div class="f-row"><label class="f-label">지점명 *</label><input class="f-input" id="f-name" value="${esc(f.name||"")}"/></div>
        <div class="f-row"><label class="f-label">상품명</label><input class="f-input" id="f-product" value="${esc(f.product||"")}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">가능 지역</div>
        <div class="region-wrap">
          <div class="sido-list" id="sido-list">${Object.keys(REGIONS).map(s=>`<button class="sido-btn${s===activeSido?" active":""}" data-sido="${s}">${s}</button>`).join("")}</div>
          <div class="gu-wrap">
            <div class="gu-ctrl"><span class="gu-ctrl-title" id="gu-title">${activeSido}</span><button class="small-btn" id="gu-all">전체선택</button><button class="small-btn gray" id="gu-none">전체해제</button></div>
            <div class="gu-grid" id="gu-grid">${renderGuGrid()}</div>
          </div>
        </div>
      </div>
      <div class="f-section">
        <div class="f-section-title">건물 유형</div>
        <div class="bldg-wrap" id="bldg-wrap">${["아파트","빌라","오피스텔","단독","다가구","상가","연립","다세대","토지"].map(b=>{const on=(f.building_types||[]).includes(b);return`<label class="cb-wrap${on?" on":""}" data-bldg="${b}"><input type="checkbox" ${on?"checked":""}> ${b}</label>`;}).join("")}</div>
      </div>
      <div class="f-section">
        <div class="f-section-title">LTV / 금리</div>
        <div class="f-row"><label class="f-label">LTV</label><input class="f-input" id="f-ltv" value="${esc(f.ltv||"")}"/></div>
        <div class="f-row"><label class="f-label">금리</label><input class="f-input" id="f-rate" value="${esc(f.rate||"")}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">후순위</div>
        <div class="f-row"><label class="f-label">가능범위</label><select class="f-select" id="f-jr">${["불가","2순위","3순위 이상","순위 무관"].map(v=>`<option${v===f.junior_rank?" selected":""}>${v}</option>`).join("")}</select></div>
        <div class="f-row"><label class="f-label">조건</label><input class="f-input" id="f-jn" value="${esc(f.junior_note||"")}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">가능 여부</div>
        <div class="yn-wrap">${[["선말소","seonmalso"],["세입자 물건지","tenant"],["퇴거자금","eviction_fund"],["MCI","mci"]].map(([l,k])=>`<label class="cb-wrap${f[k]?" on":""}" data-yn="${k}"><input type="checkbox" ${f[k]?"checked":""}> ${l}</label>`).join("")}</div>
      </div>
      <div class="f-section">
        <div class="f-section-title">대출 대상</div>
        <div class="f-row"><label class="f-label">가계/동일인</label><input class="f-input" id="f-individual" value="${esc(f.individual||"")}"/></div>
        <div class="f-row"><label class="f-label">사업자</label><input class="f-input" id="f-business" value="${esc(f.business||"")}"/></div>
        <div class="f-row"><label class="f-label">용도</label><input class="f-input" id="f-purpose" value="${esc(f.purpose||"")}"/></div>
      </div>
      <div class="f-section"><div class="f-section-title">메모</div><textarea class="f-input" id="f-memo" style="height:65px;resize:vertical">${esc(f.memo||"")}</textarea></div>
    </div>
  `;
  $("sido-list").querySelectorAll(".sido-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      activeSido=btn.dataset.sido;
      $("sido-list").querySelectorAll(".sido-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");$("gu-title").textContent=activeSido;
      $("gu-grid").innerHTML=renderGuGrid();bindGuEvents();
    });
  });
  $("gu-all").addEventListener("click",()=>{REGIONS[activeSido].forEach(gu=>{const k=`${activeSido} ${gu}`;if(!formData.regions.includes(k))formData.regions.push(k);});$("gu-grid").innerHTML=renderGuGrid();bindGuEvents();});
  $("gu-none").addEventListener("click",()=>{formData.regions=formData.regions.filter(r=>!r.startsWith(activeSido));$("gu-grid").innerHTML=renderGuGrid();bindGuEvents();});
  bindGuEvents();
  $("bldg-wrap").querySelectorAll(".cb-wrap").forEach(el=>{
    el.addEventListener("click",e=>{const b=el.dataset.bldg,cb=el.querySelector("input");if(e.target!==cb)cb.checked=!cb.checked;if(cb.checked){if(!formData.building_types.includes(b))formData.building_types.push(b);}else formData.building_types=formData.building_types.filter(x=>x!==b);el.classList.toggle("on",cb.checked);});
  });
  $("product-form-view").querySelectorAll(".cb-wrap[data-yn]").forEach(el=>{
    el.addEventListener("click",e=>{const k=el.dataset.yn,cb=el.querySelector("input");if(e.target!==cb)cb.checked=!cb.checked;formData[k]=cb.checked;el.classList.toggle("on",cb.checked);});
  });
  $("f-cancel").addEventListener("click",()=>{$("product-form-view").classList.add("hidden");$("product-main-view").style.display="flex";});
  $("f-save").addEventListener("click",async()=>{
    const data={...formData,name:$("f-name").value.trim(),product:$("f-product").value.trim(),ltv:$("f-ltv").value.trim(),rate:$("f-rate").value.trim(),junior_rank:$("f-jr").value,junior_note:$("f-jn").value.trim(),individual:$("f-individual").value.trim(),business:$("f-business").value.trim(),purpose:$("f-purpose").value.trim(),memo:$("f-memo").value.trim()};
    if(!data.name){alert("지점명을 입력하세요");return;}
    if(id)await updateDoc(doc(db,"products",id),data);else await addDoc(collection(db,"products"),data);
    $("product-form-view").classList.add("hidden");$("product-main-view").style.display="flex";
  });
}

function renderGuGrid(){return(REGIONS[activeSido]||[]).map(gu=>{const k=`${activeSido} ${gu}`,on=formData.regions.includes(k);return`<label class="gu-label${on?" on":""}" data-gu="${gu}"><input type="checkbox" ${on?"checked":""}> ${esc(gu)}</label>`;}).join("");}
function bindGuEvents(){$("gu-grid").querySelectorAll(".gu-label").forEach(el=>{el.addEventListener("click",e=>{const gu=el.dataset.gu,k=`${activeSido} ${gu}`,cb=el.querySelector("input");if(e.target!==cb)cb.checked=!cb.checked;if(cb.checked){if(!formData.regions.includes(k))formData.regions.push(k);}else formData.regions=formData.regions.filter(r=>r!==k);el.classList.toggle("on",cb.checked);});});}
</script>

<div id="card-modal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:500px">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">접수 추가</span>
      <button class="modal-close" onclick="closeCardModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-row"><label class="modal-label">거래처 *</label><input class="modal-input" id="card-branch" placeholder="아이덴, 결초, 박팀..."/></div>
      <div class="modal-row"><label class="modal-label">날짜</label><input class="modal-input" id="card-date" placeholder="03.31"/></div>
      <div class="modal-row"><label class="modal-label">고객명 *</label><input class="modal-input" id="card-name" placeholder="홍길동(공동명의)"/></div>
      <div class="modal-row"><label class="modal-label">물건지</label><input class="modal-input" id="card-location" placeholder="서울 송파 아파트"/></div>
      <div class="modal-row"><label class="modal-label">재직</label><input class="modal-input" id="card-job" placeholder="실사업자, 세입자후순위..."/></div>
      <div class="modal-row"><label class="modal-label">심사결과</label>
        <textarea class="modal-input modal-textarea" id="card-results" placeholder="금고명-결과&#10;금고명-★한도발생 2.5&#10;금고명-※검토중" style="height:90px"></textarea>
      </div>
      <div class="modal-row"><label class="modal-label">메모</label><input class="modal-input" id="card-memo" placeholder="추가 메모"/></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" onclick="closeCardModal()">취소</button>
      <button class="modal-save-btn" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
