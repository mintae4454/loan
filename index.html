<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>대출 관리 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf0;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1d2e}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
input,textarea,select,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* 로딩 */
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1117;z-index:999}
.spinner{width:36px;height:36px;border:3px solid #2a2d3e;border-top:3px solid #4f6ef7;border-radius:50%;animation:spin .8s linear infinite}
#loading p{color:#6b7db3;margin-top:14px;font-size:14px}

/* 로그인 */
#login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1117}
.login-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeIn .3s ease}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:#e8eaf0;margin-bottom:6px}
.login-sub{color:#6b7db3;font-size:13px;margin-bottom:32px}
.login-field{margin-bottom:18px;text-align:left}
.login-label{display:block;color:#9aa5c4;font-size:12px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-input{width:100%;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;padding:12px 14px;color:#e8eaf0;font-size:14px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#4f6ef7}
.login-btn{width:100%;background:linear-gradient(135deg,#4f6ef7,#7c3aed);color:white;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:disabled{opacity:.6}
.login-error{color:#ef5350;font-size:13px;margin:0 0 12px;text-align:center;padding:8px;background:#2e1010;border-radius:6px}

/* 앱 */
#app{display:flex;flex-direction:column;height:100dvh}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:8px}
.header-title{font-weight:700;font-size:14px}
.header-right{display:flex;align-items:center;gap:10px}
.user-email{color:#6b7db3;font-size:11px}
.logout-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.tab-bar{display:flex;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0;padding:0 16px;overflow-x:auto}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:#6b7db3;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:#7c9ef8;border-bottom-color:#4f6ef7}
.tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ── 진행현황 ── */
.loan-wrap{display:flex;flex:1;overflow:hidden;min-height:0}

/* 업체 사이드바 */
.sidebar{width:160px;background:#1a1d2e;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:9px 13px;color:#7c9ef8;font-weight:700;font-size:11px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.add-company-btn{background:#4f6ef7;color:white;border:none;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer}
.company-list{flex:1;overflow-y:auto}
.company-item{padding:10px 13px;color:#9aa5c4;cursor:pointer;font-size:13px;border-bottom:1px solid #1e2135;transition:all .15s;display:flex;align-items:center;gap:6px}
.company-item:hover{background:#1e2135;color:#c0c8e0}
.company-item.active{background:#252840;color:#7c9ef8;border-left:3px solid #4f6ef7;padding-left:10px}
.company-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0}

/* 메인 패널 */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.main-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #2a2d3e;background:#1a1d2e;flex-shrink:0;flex-wrap:wrap}
.main-title{color:#e8eaf0;font-weight:700;font-size:13px;flex:1;min-width:60px}
.search-input{background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:5px 9px;color:#e8eaf0;font-size:12px;width:130px;outline:none}
.search-input:focus{border-color:#4f6ef7}
.share-btn{background:#005588;color:white;border:none;border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer;font-weight:700}
.loan-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0}
.loan-item{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:11px;animation:fadeIn .2s ease;cursor:grab}
.loan-item:active{cursor:grabbing}
.loan-item.dragging{opacity:.5;border:2px dashed #4f6ef7}
.loan-item.drag-over{border-color:#4caf50;background:#1a2e1a}
.loan-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.customer-info{flex:1}
.customer-name{color:#e8eaf0;font-weight:700;font-size:13px}
.customer-status{color:#7c9ef8;font-size:11px;margin-top:2px}
.loan-actions{display:flex;gap:4px;flex-shrink:0}
.edit-btn{background:#2a5298;color:white;border:none;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer}
.del-btn{background:#7a1e1e;color:white;border:none;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer}
.save-btn{background:#1a7a3a;color:white;border:none;border-radius:3px;padding:4px 10px;font-size:11px;cursor:pointer}
.cancel-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:3px;padding:4px 10px;font-size:11px;cursor:pointer}
.loan-details{color:#9aa5c4;font-size:12px;white-space:pre-wrap;line-height:1.6;margin-top:6px}
.edit-form{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.edit-input{background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;outline:none}
.edit-input:focus{border-color:#4f6ef7}
.edit-textarea{background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;resize:vertical;outline:none;line-height:1.6}
.edit-textarea:focus{border-color:#4f6ef7}
.edit-actions{display:flex;gap:5px}
.add-row{padding:9px 12px;border-top:1px solid #2a2d3e;display:flex;gap:7px;flex-shrink:0}
.add-input{flex:1;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:5px;padding:7px 11px;color:#e8eaf0;font-size:13px;outline:none}
.add-input:focus{border-color:#4f6ef7}
.add-btn{background:#4f6ef7;color:white;border:none;border-radius:5px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:700}

/* 공유 패널 - 가로 2개 나란히 */
.panels{display:flex;flex-direction:row;border-top:1px solid #2a2d3e;flex-shrink:0;height:220px}
.shared-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid #2a2d3e}
.shared-panel:last-child{border-right:none}
.shared-header{padding:7px 11px;color:#7c9ef8;font-weight:700;font-size:11px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;gap:6px}
.panel-search{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:3px 7px;color:#e8eaf0;font-size:11px;outline:none}
.panel-search:focus{border-color:#4f6ef7}
.shared-area{flex:1;background:#0f1117;border:none;color:#e8eaf0;font-size:12px;padding:10px;resize:none;outline:none;line-height:1.7}

/* ── 상품관리 ── */
.product-tab-wrap{display:flex;flex:1;overflow:hidden;min-height:0}
.product-sidebar{width:240px;background:#1a1d2e;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0}
.product-top{padding:9px;display:flex;gap:7px;border-bottom:1px solid #2a2d3e}
.product-search{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;outline:none}
.product-add-btn{background:#4f6ef7;color:white;border:none;border-radius:5px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:700;flex-shrink:0}
.product-count{padding:4px 11px;color:#6b7db3;font-size:10px}
.product-list{flex:1;overflow-y:auto}
.product-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #1e2135;transition:all .15s}
.product-item:hover{background:#1e2135}
.product-item.active{background:#252840}
.product-name-row{display:flex;align-items:center;gap:4px;font-weight:600;font-size:12px}
.stop-dot{color:#ef5350;font-size:9px}
.product-sub{color:#6b7db3;font-size:10px;margin-top:2px}
.product-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.product-detail{flex:1;overflow-y:auto;padding:18px}
.product-placeholder{display:flex;align-items:center;justify-content:center;height:150px;color:#3a4060;font-size:14px}
.detail-stop{background:#3a1010;color:#ef5350;border-radius:5px;padding:6px 11px;font-weight:700;font-size:11px;margin-bottom:10px;display:inline-block}
.detail-name{color:#e8eaf0;font-size:19px;font-weight:700;margin-bottom:3px}
.detail-product-lbl{color:#7c9ef8;font-size:12px;margin-bottom:12px}
.detail-btn-row{display:flex;gap:7px;margin-bottom:14px}
.detail-edit-btn{background:#2a5298;color:white;border:none;border-radius:5px;padding:6px 12px;font-size:11px;cursor:pointer}
.detail-del-btn{background:#7a1e1e;color:white;border:none;border-radius:5px;padding:6px 12px;font-size:11px;cursor:pointer}
.detail-sep{border:none;border-top:1px solid #2a2d3e;margin:10px 0}
.d-field{margin-bottom:10px}
.d-label{color:#6b7db3;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.d-val{color:#e8eaf0;font-size:12px;line-height:1.6}
.d-region{color:#7c9ef8;font-size:12px;line-height:1.7}
.tag{display:inline-block;border-radius:3px;padding:1px 7px;font-size:10px;margin:2px;background:#252840;color:#7c9ef8}
.tag.green{background:#1a2e1a;color:#4caf50}
.tag.red{background:#2e1a1a;color:#ef5350}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}

/* 통계 패널 */
.stats-panel{width:280px;background:#1a1d2e;border-left:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.stats-header{padding:10px 14px;color:#7c9ef8;font-weight:700;font-size:12px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.stats-date-input{background:#0f1117;border:1px solid #2a2d3e;border-radius:4px;padding:3px 6px;color:#e8eaf0;font-size:11px;outline:none;width:110px}
.stats-body{flex:1;overflow-y:auto;padding:10px}
.stats-total{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.stat-card{background:#0f1117;border:1px solid #2a2d3e;border-radius:6px;padding:8px 10px;text-align:center}
.stat-card-num{font-size:20px;font-weight:700;color:#7c9ef8}
.stat-card-lbl{font-size:10px;color:#6b7db3;margin-top:2px}
.stats-table{width:100%;border-collapse:collapse;font-size:11px}
.stats-table th{color:#6b7db3;font-weight:600;padding:5px 6px;border-bottom:1px solid #2a2d3e;text-align:left;white-space:nowrap}
.stats-table td{padding:5px 6px;border-bottom:1px solid #1e2135;color:#c0c8e0;white-space:nowrap}
.stats-table tr:last-child td{border-bottom:none}
.stats-table .num{text-align:right;color:#7c9ef8;font-weight:600}
.stats-empty{color:#3a4060;text-align:center;padding:20px;font-size:12px}

/* 폼 */
.form-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.form-header{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;flex-shrink:0}
.form-title{color:#e8eaf0;font-size:15px;font-weight:700}
.form-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.f-section{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:7px;padding:14px}
.f-section-title{color:#7c9ef8;font-weight:700;font-size:11px;margin-bottom:12px}
.f-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.f-label{color:#9aa5c4;font-size:12px;min-width:85px;flex-shrink:0}
.f-input{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;outline:none}
.f-input:focus{border-color:#4f6ef7}
.f-select{flex:1;background:#0f1117;border:1px solid #2a2d3e;border-radius:5px;padding:6px 9px;color:#e8eaf0;font-size:12px;outline:none}
.region-wrap{display:flex;gap:8px;height:200px}
.sido-list{width:115px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.sido-btn{background:#1e2135;color:#9aa5c4;border:1px solid #2a2d3e;border-radius:3px;padding:4px 7px;font-size:10px;cursor:pointer;text-align:left}
.sido-btn.active{background:#252840;color:#7c9ef8;border-color:#4f6ef7}
.gu-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gu-ctrl{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.gu-ctrl-title{color:#9aa5c4;font-size:10px;flex:1}
.small-btn{background:#4f6ef7;color:white;border:none;border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer}
.small-btn.gray{background:#2a2d3e;color:#9aa5c4}
.gu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:3px;overflow-y:auto;flex:1}
.gu-label{display:flex;align-items:center;gap:3px;cursor:pointer;font-size:11px;color:#9aa5c4;padding:1px}
.gu-label.on{color:#7c9ef8}
.bldg-wrap{display:flex;flex-wrap:wrap;gap:7px}
.cb-wrap{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:#9aa5c4}
.cb-wrap.on{color:#7c9ef8}
.yn-wrap{display:flex;flex-wrap:wrap;gap:14px}
.form-save-btn{background:#4f6ef7;color:white;border:none;border-radius:5px;padding:7px 18px;font-size:13px;cursor:pointer;font-weight:700}
.form-cancel-btn{background:#2a2d3e;color:#9aa5c4;border:none;border-radius:5px;padding:7px 14px;font-size:13px;cursor:pointer}

/* 모바일 */
@media(max-width:700px){
  body{overflow:auto}
  #app{height:auto;min-height:100dvh}
  .loan-wrap{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;height:auto;max-height:35vh;border-right:none;border-bottom:1px solid #2a2d3e}
  .main-panel{height:auto;min-height:60vh}
  .panels{height:auto;flex-direction:column}
  .shared-panel{height:160px;border-right:none;border-bottom:1px solid #2a2d3e}
  .product-tab-wrap{flex-direction:column;height:auto;overflow:visible}
  .product-sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid #2a2d3e}
  .product-right{height:auto}
  .stats-panel{width:100%;border-left:none;border-top:1px solid #2a2d3e}
  .tab-content{overflow:auto}
  .loan-list{min-height:200px}
  .d-grid{grid-template-columns:1fr}
  .region-wrap{height:180px}
  .sido-list{width:100px}
  .header-title{font-size:13px}
  .user-email{display:none}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>로딩 중...</p></div>

<div id="login-page" class="hidden">
  <div class="login-card">
    <div class="login-logo">🏦</div>
    <h1 class="login-title">대출 관리 시스템</h1>
    <p class="login-sub">Loan Management System</p>
    <div class="login-field"><label class="login-label">이메일</label><input class="login-input" id="login-email" type="email" placeholder="example@email.com"/></div>
    <div class="login-field"><label class="login-label">비밀번호</label><input class="login-input" id="login-pw" type="password" placeholder="••••••••"/></div>
    <p class="login-error hidden" id="login-error"></p>
    <button class="login-btn" id="login-btn">로그인</button>
  </div>
</div>

<div id="app" class="hidden">
  <header class="header">
    <div class="header-left"><span style="font-size:18px">🏦</span><span class="header-title">대출 관리 시스템</span></div>
    <div class="header-right"><span class="user-email" id="user-email"></span><button class="logout-btn" id="logout-btn">로그아웃</button></div>
  </header>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="loan">📁 진행현황</button>
    <button class="tab-btn" data-tab="product">🏦 상품 관리</button>
  </nav>

  <!-- 진행현황 -->
  <div id="tab-loan" class="tab-content">
    <div class="loan-wrap">
      <div class="sidebar">
        <div class="sidebar-header">
          🏢 업체
          <button class="add-company-btn" id="add-company-btn">+</button>
        </div>
        <div class="company-list" id="company-list"></div>
      </div>
      <div class="main-panel">
        <div class="main-header">
          <span class="main-title" id="main-title">업체를 선택하세요</span>
          <input class="search-input" id="search-input" placeholder="🔍 검색..."/>
          <button class="share-btn hidden" id="share-btn">📤 공유</button>
        </div>
        <div class="loan-list" id="loan-list"></div>
        <div class="add-row hidden" id="add-row">
          <input class="add-input" id="add-input" placeholder="고객명 입력..."/>
          <button class="add-btn" id="add-btn">➕ 추가</button>
        </div>
      </div>
    </div>
    <!-- 공유 패널 가로 2개 -->
    <div class="panels">
      <div class="shared-panel">
        <div class="shared-header">
          📌 진행건
          <input class="panel-search" id="progress-search" placeholder="검색..."/>
        </div>
        <textarea class="shared-area" id="progress-area" placeholder="진행건을 입력하세요..."></textarea>
      </div>
      <div class="shared-panel">
        <div class="shared-header">
          📋 지점접수 현황
          <input class="panel-search" id="notice-search" placeholder="검색..."/>
        </div>
        <textarea class="shared-area" id="notice-area" placeholder="지점접수 현황을 입력하세요..."></textarea>
      </div>
    </div>
  </div>

  <!-- 상품관리 -->
  <div id="tab-product" class="tab-content hidden">
    <div class="product-tab-wrap">
      <div id="product-main-view" style="display:flex;flex:1;overflow:hidden;min-height:0">
        <div class="product-sidebar">
          <div class="product-top"><input class="product-search" id="product-search" placeholder="🔍 지역, LTV, 선말소..."/><button class="product-add-btn" id="product-add-btn">＋</button></div>
          <div class="product-count" id="product-count">0개</div>
          <div class="product-list" id="product-list"></div>
        </div>
        <div class="product-right">
          <div class="product-detail" id="product-detail"><div class="product-placeholder">← 상품을 선택하세요</div></div>
        </div>
        <!-- 통계 패널 -->
        <div class="stats-panel">
          <div class="stats-header">
            📊 신청 통계
            <input class="stats-date-input" type="date" id="stats-date"/>
          </div>
          <div class="stats-body" id="stats-body"><div class="stats-empty">날짜를 선택하세요</div></div>
        </div>
      </div>

// ── 초기화 ──
function initData(){
  // 업체 목록
  onSnapshot(doc(db,'settings','telegram_ids'),snap=>{
    if(!snap.exists())return;
    companies=snap.data();
    renderCompanies();
  });

  // 공유 패널 실시간
  onSnapshot(doc(db,'shared','progress'),s=>{
    if(s.exists()){const v=s.data().html||'';if($('progress-area')!==document.activeElement)$('progress-area').value=v;}
  });
  onSnapshot(doc(db,'shared','notice'),s=>{
    if(s.exists()){const v=s.data().html||'';if($('notice-area')!==document.activeElement)$('notice-area').value=v;}
  });

  // 공유 패널 저장 (debounce)
  ['progress','notice'].forEach(key=>{
    const area=$(key+'-area');
    area.addEventListener('input',()=>{
      clearTimeout(sharedTimers[key]);
      sharedTimers[key]=setTimeout(async()=>{
        await setDoc(doc(db,'shared',key),{html:area.value,updatedBy:currentUser.email,updatedAt:new Date().toISOString()},{merge:true});
      },800);
    });
  });

  // 패널 검색 (Ctrl+F 대용)

  onSnapshot(collection(db,'products'),snap=>{
    products=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  });

  // 통계 날짜 기본값 (오늘)

  // 버튼
  $('add-btn').addEventListener('click',addCustomer);
  $('add-input').addEventListener('keydown',e=>{if(e.key==='Enter')addCustomer();});
  $('search-input').addEventListener('input',renderLoans);
  $('share-btn').addEventListener('click',shareToTelegram);
  $('add-company-btn').addEventListener('click',addCompany);
  $('product-add-btn').addEventListener('click',()=>showProductForm(null));

}

// ── 패널 검색 하이라이트 (스크롤) ──
function highlightPanel(areaId,kw){
  const area=$(areaId);
  if(!kw){area.style.background='#0f1117';return;}
  const text=area.value.toLowerCase();
  const idx=text.indexOf(kw.toLowerCase());
  if(idx>=0){
    area.focus();area.setSelectionRange(idx,idx+kw.length);
    const linesBefore=area.value.substring(0,idx).split('\n').length;
    area.scrollTop=(linesBefore-2)*area.scrollHeight/area.value.split('\n').length;
  }
}

// ── 통계 로드 ──
function loadStats(dateStr){
  if(statsUnsub)statsUnsub();
  statsUnsub=onSnapshot(doc(db,'stats',dateStr),snap=>{
    if(!snap.exists()){
      $('stats-body').innerHTML='<div class="stats-empty">해당 날짜 데이터 없음</div>';
      return;
    }
    const d=snap.data();
    const groups=d.groups||{};
    const total=d.total||0;
    const progReq=d.progress_req||{};
    const approved=d.approved_groups||{};
    const rejected=d.rejected_groups||{};
    const registryNeeded=d.registry_needed||{};

    const totalAppr=Object.values(approved).reduce((a,b)=>a+b,0);
    const totalRej=Object.values(rejected).reduce((a,b)=>a+b,0);
    const totalReq=Object.values(progReq).reduce((a,b)=>a+b,0);

    const activeGroups=Object.entries(groups).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

    $('stats-body').innerHTML=`
      <div class="stats-total">
        <div class="stat-card"><div class="stat-card-num">${total}</div><div class="stat-card-lbl">총 접수</div></div>
        <div class="stat-card"><div class="stat-card-num" style="color:#4caf50">${totalAppr}</div><div class="stat-card-lbl">승인</div></div>
        <div class="stat-card"><div class="stat-card-num" style="color:#ef5350">${totalRej}</div><div class="stat-card-lbl">부결</div></div>
      </div>
      ${activeGroups.length?`
      <table class="stats-table">
        <thead><tr><th>지점</th><th class="num">접수</th><th class="num">본진행</th><th class="num">승인</th><th class="num">부결</th></tr></thead>
        <tbody>
          ${activeGroups.map(([g,cnt])=>`
            <tr>
              <td>${esc(g)}</td>
              <td class="num">${cnt}</td>
              <td class="num">${progReq[g]||0}</td>
              <td class="num" style="color:#4caf50">${approved[g]||0}</td>
              <td class="num" style="color:#ef5350">${rejected[g]||0}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`:'<div class="stats-empty">접수 없음</div>'}
    `;
  });
}

function renderCompanies(){
  const names=Object.keys(companies).filter(k=>k!=='_placeholder').sort();
  $('company-list').innerHTML=names.map(c=>{
    const hasData=loans.some(l=>l.company===c);
    return`<div class="company-item${c===selectedCompany?' active':''}" data-name="${esc(c)}">
      ${hasData?'<span class="company-dot"></span>':''}${esc(c)}
    </div>`;
  }).join('');
  $('company-list').querySelectorAll('.company-item').forEach(el=>el.addEventListener('click',()=>selectCompany(el.dataset.name)));
}

async function addCompany(){
  const name=prompt('새 업체명:');
  if(!name?.trim())return;
  const tid=prompt('텔레그램 ID (없으면 빈 칸):');
  await setDoc(doc(db,'settings','telegram_ids'),{[name.trim()]:tid||'0'},{merge:true});

function selectCompany(name){
  selectedCompany=name;
  $('main-title').textContent=name;

  $('share-btn').classList.remove('hidden');
  document.querySelectorAll('.company-item').forEach(el=>el.classList.toggle('active',el.dataset.name===name));

function renderLoans(){
  const kw=$('search-input').value.toLowerCase();
  const list=kw?loans.filter(l=>(l.customer||'').toLowerCase().includes(kw)||(l.status||'').toLowerCase().includes(kw)||(l.details||'').toLowerCase().includes(kw)):loans;
  $('loan-list').innerHTML=list.map(loan=>`
    <div class="loan-item" draggable="true" data-id="${loan.id}" data-order="${loan.order??0}">
      <div class="loan-header">
        <div class="customer-info">
          <div class="customer-name">${esc(loan.customer||'')}</div>
          ${loan.status&&loan.status!=='-'?`<div class="customer-status">${esc(loan.status)}</div>`:''}
        </div>
        <div class="loan-actions">
          <button class="edit-btn" data-id="${loan.id}">수정</button>
          <button class="del-btn" data-id="${loan.id}">삭제</button>

      </div>
      ${loan.details?`<div class="loan-details">${esc(loan.details)}</div>`:''}
      <div class="edit-form hidden" id="ef-${loan.id}">
        <input class="edit-input" id="ec-${loan.id}" placeholder="고객명" value="${esc(loan.customer||'')}"/>
        <input class="edit-input" id="es-${loan.id}" placeholder="상태" value="${esc(loan.status||'')}"/>
        <textarea class="edit-textarea" id="ed-${loan.id}" rows="3" placeholder="상세내용">${esc(loan.details||'')}</textarea>
        <div class="edit-actions">
          <button class="save-btn" data-id="${loan.id}">저장</button>
          <button class="cancel-btn">취소</button>
        </div>
      </div>
    </div>
  `).join('')||'<div style="color:#3a4060;padding:20px;text-align:center;font-size:13px">고객이 없습니다</div>';

  // 이벤트
  $('loan-list').querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id,item=btn.closest('.loan-item');
      item.querySelector('.customer-info').style.display='none';
      const det=item.querySelector('.loan-details');if(det)det.style.display='none';
      item.querySelector('.loan-actions').style.display='none';
      $('ef-'+id).classList.remove('hidden');
    });
  });
  $('loan-list').querySelectorAll('.cancel-btn').forEach(btn=>btn.addEventListener('click',renderLoans));
  $('loan-list').querySelectorAll('.save-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const id=btn.dataset.id;
      await updateDoc(doc(db,'loans',id),{customer:$('ec-'+id).value.trim(),status:$('es-'+id).value.trim(),details:$('ed-'+id).value.trim(),updatedBy:currentUser.email,updatedAt:new Date().toISOString()});
    });
  });
  $('loan-list').querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{if(!confirm('삭제할까요?'))return;await deleteDoc(doc(db,'loans',btn.dataset.id));});

  initDragDrop();

// ── 드래그 앤 드롭 순서 변경 ──
let dragId=null;
function initDragDrop(){
  const items=$('loan-list').querySelectorAll('.loan-item');
  items.forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragId=item.dataset.id;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      item.classList.add('drag-over');
    });
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',async e=>{
      e.preventDefault();
      item.classList.remove('drag-over');
      if(!dragId||dragId===item.dataset.id)return;
      // 새 순서 계산
      const allItems=[...$('loan-list').querySelectorAll('.loan-item')];
      const fromIdx=allItems.findIndex(i=>i.dataset.id===dragId);
      const toIdx=allItems.findIndex(i=>i.dataset.id===item.dataset.id);
      const reordered=[...loans];
      const [moved]=reordered.splice(fromIdx,1);
      reordered.splice(toIdx,0,moved);
      // Firebase 업데이트
      const batch=[];
      reordered.forEach((l,i)=>batch.push(updateDoc(doc(db,'loans',l.id),{order:i})));
      await Promise.all(batch);
    });
  });
}

async function addCustomer(){
  const inp=$('add-input'),name=inp.value.trim();
  if(!name||!selectedCompany)return;
  const ref=doc(collection(db,'loans'));
  await setDoc(ref,{customer:name,status:'-',details:'',company:selectedCompany,order:loans.length,id:ref.id});
  inp.value='';
}

async function shareToTelegram(){
  if(!selectedCompany)return;
  const tid=companies[selectedCompany];
  if(!tid||tid==='0'){alert('텔레그램 ID가 없습니다.');return;}
  let msg='진행현황\n';
  loans.forEach(l=>{
    const txt=[l.customer,l.status,l.details].filter(Boolean).join('\n');
    if(txt.trim())msg+='\n'+txt+'\n----------------------------------------';
  });
  await addDoc(collection(db,'commands'),{chat_id:isNaN(tid)?tid:parseInt(tid),text:msg,status:'pending',timestamp:serverTimestamp()});
  alert('['+selectedCompany+'] 텔레그램 전송 완료');
}

function getSearchText(p){
  const regions=[...(p.regions||[])];
  (p.regions||[]).forEach(r=>{
    Object.entries(REGIONS).forEach(([sido,cities])=>{if(r.includes('전체')&&r.includes(sido))regions.push(...cities);});
    Object.entries(SIDO_ALIAS).forEach(([alias,full])=>{if(r.includes(full))regions.push(alias);});
  });
  return[p.name,p.product,...regions,...(p.building_types||[]),p.ltv,p.rate,p.junior_rank,p.junior_note,p.individual,p.business,p.memo,p.seonmalso?'선말소':'',p.tenant?'세입자':'',p.eviction_fund?'퇴거':'',p.mci?'MCI':''].join(' ').toLowerCase();
}

function renderProductList(){
  const kws=$('product-search').value.trim().toLowerCase().split(/[\s,]+/).filter(Boolean);
  const filtered=kws.length?products.filter(p=>{const t=getSearchText(p);return kws.every(k=>t.includes(k)||(SIDO_ALIAS[k]&&t.includes(SIDO_ALIAS[k].toLowerCase())));}):products;
  $('product-count').textContent=filtered.length+'개';
  $('product-list').innerHTML=filtered.map(p=>{
    const stopped=(p.product||'').includes('[중단]');
    return`<div class="product-item${selectedProduct?.id===p.id?' active':''}" data-id="${p.id}">
      <div class="product-name-row">${stopped?'<span class="stop-dot">●</span>':''}<span style="color:${stopped?'#ef5350':'#e8eaf0'}">${esc(p.name)}</span></div>
      <div class="product-sub">${(p.regions||[]).slice(0,2).map(r=>esc(r)).join(', ')}${(p.regions||[]).length>2?'...':''}</div>
    </div>`;
  }).join('')||'<div style="color:#3a4060;padding:20px;text-align:center;font-size:12px">검색 결과 없음</div>';
  $('product-list').querySelectorAll('.product-item').forEach(el=>{
    el.addEventListener('click',()=>{selectedProduct=products.find(p=>p.id===el.dataset.id);renderProductList();renderProductDetail(selectedProduct);});
  });
}

function renderProductDetail(p){
  if(!p)return;
  const stopped=(p.product||'').includes('[중단]');
  const tag=(text,cls='')=>`<span class="tag ${cls}">${esc(text)}</span>`;
  $('product-detail').innerHTML=`
    ${stopped?'<div class="detail-stop">🚫 중단된 상품</div>':''}
    <h2 class="detail-name">${esc(p.name)}</h2>
    ${p.product?`<div class="detail-product-lbl">${esc((p.product||'').replace(' [중단]',''))}</div>`:''}
    <div class="detail-btn-row">
      <button class="detail-edit-btn" data-id="${p.id}">✏ 수정</button>
      <button class="detail-del-btn" data-id="${p.id}">🗑 삭제</button>
    </div>
    <hr class="detail-sep"/>
    ${(p.regions||[]).length?`<div class="d-field"><div class="d-label">가능 지역</div><div class="d-region">${p.regions.map(r=>esc(r)).join(', ')}</div></div>`:''}
    ${(p.building_types||[]).length?`<div class="d-field"><div class="d-label">건물 유형</div><div>${p.building_types.map(b=>tag(b)).join('')}</div></div>`:''}
    <div class="d-grid">
      ${p.ltv?`<div class="d-field"><div class="d-label">LTV</div><div class="d-val">${esc(p.ltv)}</div></div>`:''}
      ${p.rate?`<div class="d-field"><div class="d-label">금리</div><div class="d-val">${esc(p.rate)}</div></div>`:''}
    </div>
    <div class="d-field"><div class="d-label">후순위</div>${tag(p.junior_rank||'불가',p.junior_rank==='불가'?'red':'green')} ${p.junior_note?`<span style="color:#9aa5c4;font-size:11px;margin-left:5px">${esc(p.junior_note)}</span>`:''}</div>
    <div class="d-field"><div class="d-label">가능 여부</div>${[['선말소','seonmalso'],['세입자 물건지','tenant'],['퇴거자금','eviction_fund'],['MCI','mci']].map(([l,k])=>tag((p[k]?'✓ ':'✗ ')+l,p[k]?'green':'red')).join('')}</div>
    <div class="d-grid">
      ${p.individual?`<div class="d-field"><div class="d-label">가계/동일인</div><div class="d-val">${esc(p.individual)}</div></div>`:''}
      ${p.business?`<div class="d-field"><div class="d-label">사업자</div><div class="d-val">${esc(p.business)}</div></div>`:''}
      ${p.purpose?`<div class="d-field"><div class="d-label">용도</div><div class="d-val">${esc(p.purpose)}</div></div>`:''}
    </div>
    ${p.memo?`<div class="d-field"><div class="d-label">메모</div><div class="d-val" style="color:#9aa5c4">${esc(p.memo)}</div></div>`:''}
  `;
  $('product-detail').querySelector('.detail-edit-btn').addEventListener('click',()=>showProductForm(p.id));
  $('product-detail').querySelector('.detail-del-btn').addEventListener('click',async()=>{
    if(!confirm('삭제할까요?'))return;
    await deleteDoc(doc(db,'products',p.id));
    selectedProduct=null;
    $('product-detail').innerHTML='<div class="product-placeholder">← 상품을 선택하세요</div>';
  });
}

function showProductForm(id){
  const p=id?products.find(x=>x.id===id):null;
  formData=p?JSON.parse(JSON.stringify(p)):{name:'',product:'컨비',regions:[],building_types:[],ltv:'',rate:'',junior_rank:'불가',junior_note:'',seonmalso:false,tenant:false,eviction_fund:false,mci:false,individual:'',business:'',purpose:'',memo:''};
  activeSido=Object.keys(REGIONS)[0];
  $('product-main-view').style.display='none';
  $('product-form-view').classList.remove('hidden');
  renderForm(id);
}

function renderForm(id){
  const f=formData;
  $('product-form-view').innerHTML=`
    <div class="form-header">
      <div class="form-title">${id?'상품 수정':'상품 등록'}</div>
      <div style="display:flex;gap:7px">
        <button class="form-cancel-btn" id="f-cancel">취소</button>
        <button class="form-save-btn" id="f-save">저장</button>
      </div>
    </div>
    <div class="form-body">
      <div class="f-section">
        <div class="f-section-title">기본 정보</div>
        <div class="f-row"><label class="f-label">지점명 *</label><input class="f-input" id="f-name" value="${esc(f.name||'')}"/></div>
        <div class="f-row"><label class="f-label">상품명</label><input class="f-input" id="f-product" value="${esc(f.product||'')}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">가능 지역</div>
        <div class="region-wrap">
          <div class="sido-list" id="sido-list">${Object.keys(REGIONS).map(s=>`<button class="sido-btn${s===activeSido?' active':''}" data-sido="${s}">${s}</button>`).join('')}</div>
          <div class="gu-wrap">
            <div class="gu-ctrl"><span class="gu-ctrl-title" id="gu-title">${activeSido}</span><button class="small-btn" id="gu-all">전체선택</button><button class="small-btn gray" id="gu-none">전체해제</button></div>
            <div class="gu-grid" id="gu-grid">${renderGuGrid()}</div>
          </div>
        </div>
      </div>
      <div class="f-section">
        <div class="f-section-title">건물 유형</div>
        <div class="bldg-wrap" id="bldg-wrap">${["아파트","빌라","오피스텔","단독","다가구","상가","연립","다세대","토지"].map(b=>{const on=(f.building_types||[]).includes(b);return`<label class="cb-wrap${on?' on':''}" data-bldg="${b}"><input type="checkbox" ${on?'checked':''}> ${b}</label>`;}).join('')}</div>
      </div>
      <div class="f-section">
        <div class="f-section-title">LTV / 금리</div>
        <div class="f-row"><label class="f-label">LTV</label><input class="f-input" id="f-ltv" value="${esc(f.ltv||'')}"/></div>
        <div class="f-row"><label class="f-label">금리</label><input class="f-input" id="f-rate" value="${esc(f.rate||'')}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">후순위</div>
        <div class="f-row"><label class="f-label">가능범위</label><select class="f-select" id="f-jr">${['불가','2순위','3순위 이상','순위 무관'].map(v=>`<option${v===f.junior_rank?' selected':''}>${v}</option>`).join('')}</select></div>
        <div class="f-row"><label class="f-label">조건</label><input class="f-input" id="f-jn" value="${esc(f.junior_note||'')}"/></div>
      </div>
      <div class="f-section">
        <div class="f-section-title">가능 여부</div>
        <div class="yn-wrap">${[['선말소','seonmalso'],['세입자 물건지','tenant'],['퇴거자금','eviction_fund'],['MCI','mci']].map(([l,k])=>`<label class="cb-wrap${f[k]?' on':''}" data-yn="${k}"><input type="checkbox" ${f[k]?'checked':''}> ${l}</label>`).join('')}</div>
      </div>
      <div class="f-section">
        <div class="f-section-title">대출 대상</div>
        <div class="f-row"><label class="f-label">가계/동일인</label><input class="f-input" id="f-individual" value="${esc(f.individual||'')}"/></div>
        <div class="f-row"><label class="f-label">사업자</label><input class="f-input" id="f-business" value="${esc(f.business||'')}"/></div>
        <div class="f-row"><label class="f-label">용도</label><input class="f-input" id="f-purpose" value="${esc(f.purpose||'')}"/></div>
      </div>
      <div class="f-section"><div class="f-section-title">메모</div><textarea class="f-input" id="f-memo" style="height:65px;resize:vertical">${esc(f.memo||'')}</textarea></div>
    </div>
  `;
  $('sido-list').querySelectorAll('.sido-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeSido=btn.dataset.sido;
      $('sido-list').querySelectorAll('.sido-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');$('gu-title').textContent=activeSido;
      $('gu-grid').innerHTML=renderGuGrid();bindGuEvents();
    });
  });
  $('gu-all').addEventListener('click',()=>{REGIONS[activeSido].forEach(gu=>{const k=`${activeSido} ${gu}`;if(!formData.regions.includes(k))formData.regions.push(k);});$('gu-grid').innerHTML=renderGuGrid();bindGuEvents();});
  $('gu-none').addEventListener('click',()=>{formData.regions=formData.regions.filter(r=>!r.startsWith(activeSido));$('gu-grid').innerHTML=renderGuGrid();bindGuEvents();});
  bindGuEvents();
  $('bldg-wrap').querySelectorAll('.cb-wrap').forEach(el=>{
    el.addEventListener('click',e=>{const b=el.dataset.bldg,cb=el.querySelector('input');if(e.target!==cb)cb.checked=!cb.checked;if(cb.checked){if(!formData.building_types.includes(b))formData.building_types.push(b);}else formData.building_types=formData.building_types.filter(x=>x!==b);el.classList.toggle('on',cb.checked);});
  });
  $('product-form-view').querySelectorAll('.cb-wrap[data-yn]').forEach(el=>{
    el.addEventListener('click',e=>{const k=el.dataset.yn,cb=el.querySelector('input');if(e.target!==cb)cb.checked=!cb.checked;formData[k]=cb.checked;el.classList.toggle('on',cb.checked);});
  });
  $('f-cancel').addEventListener('click',()=>{$('product-form-view').classList.add('hidden');$('product-main-view').style.display='flex';});
  $('f-save').addEventListener('click',async()=>{
    const data={...formData,name:$('f-name').value.trim(),product:$('f-product').value.trim(),ltv:$('f-ltv').value.trim(),rate:$('f-rate').value.trim(),junior_rank:$('f-jr').value,junior_note:$('f-jn').value.trim(),individual:$('f-individual').value.trim(),business:$('f-business').value.trim(),purpose:$('f-purpose').value.trim(),memo:$('f-memo').value.trim()};
    if(!data.name){alert('지점명을 입력하세요');return;}
    if(id)await updateDoc(doc(db,'products',id),data);else await addDoc(collection(db,'products'),data);
    $('product-form-view').classList.add('hidden');$('product-main-view').style.display='flex';
  });
}

function renderGuGrid(){return(REGIONS[activeSido]||[]).map(gu=>{const k=`${activeSido} ${gu}`,on=formData.regions.includes(k);return`<label class="gu-label${on?' on':''}" data-gu="${gu}"><input type="checkbox" ${on?'checked':''}> ${esc(gu)}</label>`;}).join('');}
function bindGuEvents(){$('gu-grid').querySelectorAll('.gu-label').forEach(el=>{el.addEventListener('click',e=>{const gu=el.dataset.gu,k=`${activeSido} ${gu}`,cb=el.querySelector('input');if(e.target!==cb)cb.checked=!cb.checked;if(cb.checked){if(!formData.regions.includes(k))formData.regions.push(k);}else formData.regions=formData.regions.filter(r=>r!==k);el.classList.toggle('on',cb.checked);});});}
</script>
</body>
</html>
